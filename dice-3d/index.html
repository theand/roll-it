<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 주사위</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="mode-nav">
    <a href="../index.html">윷</a>
    <a href="../dice.html">주사위</a>
    <a href="./" class="nav-active">3D</a>
  </nav>

  <div id="title">COSMIC DICE</div>
  <canvas id="dice-canvas"></canvas>
  <div id="controls">
    <div id="dice-count">
      <span class="dice-label">DICE</span>
      <button type="button" data-count="1" class="count-btn active">1</button>
      <button type="button" data-count="2" class="count-btn">2</button>
      <button type="button" data-count="3" class="count-btn">3</button>
      <button type="button" data-count="4" class="count-btn">4</button>
    </div>
    <div id="dice-sides">
      <span class="dice-label">SIDES</span>
      <button type="button" data-sides="6" class="sides-btn">D6</button>
      <button type="button" data-sides="8" class="sides-btn">D8</button>
      <button type="button" data-sides="12" class="sides-btn">D12</button>
      <button type="button" data-sides="20" class="sides-btn active">D20</button>
    </div>
    <button type="button" id="roll-btn">ROLL</button>
  </div>
  <div id="webgl-error" hidden>
    <p>WebGL을 지원하지 않는 브라우저입니다.</p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
